<!DOCTYPE html>
<html lang="en">
<head>
  <script type="text/javascript" src="https://dt.rb.cz:443/jstag/managed/20b34ab1-143e-43a0-ade3-c86c4870bbb0/970ab999c1609e99_complete.js" crossorigin="anonymous"></script>  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex — PokeAPI SPA</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://pokeapi.co" />
  <link rel="preconnect" href="https://raw.githubusercontent.com" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-dot" aria-hidden="true"></span>
      <h1>Pokédex</h1>
    </div>
    <form id="search-form" class="search" role="search">
      <input
        id="search-input"
        type="search"
        name="q"
        placeholder="Search by name or number…"
        autocomplete="off"
        aria-label="Search Pokémon"
      />
      <button type="submit" aria-label="Search">Search</button>
    </form>
  </header>

  <main>
    <!-- Status / messages -->
    <div id="status" class="status" role="status" aria-live="polite"></div>

    <!-- Grid of pokemon cards -->
    <section id="grid" class="grid" aria-label="Pokémon list"></section>

    <!-- Load more -->
    <div class="load-more-wrap">
      <button id="load-more" class="load-more" hidden>Load more</button>
    </div>
  </main>

  <!-- Detail modal -->
  <div id="modal" class="modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-name">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" id="modal-card">
      <button class="modal-close" data-close aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
